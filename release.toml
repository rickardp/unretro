# cargo-release configuration for the unretro workspace.
# Reference: https://github.com/crate-ci/cargo-release/blob/HEAD/docs/reference.md
#
# What `cargo release <level> --execute` does in this workspace:
#   1. Bump the workspace version in Cargo.toml (both crates inherit via
#      `version.workspace = true`, and pyproject.toml reads it via
#      `dynamic = ["version"]` + maturin — Python stays lockstep).
#   2. Update Cargo.lock.
#   3. Run `cargo publish --dry-run` against `unretro` to verify packaging.
#   4. Create a single commit covering both crates.
#   5. Create an annotated `v{version}` tag.
#   6. Push the commit and tag to origin, which triggers .github/workflows/release.yml.
#
# `cargo release` never publishes itself — the release workflow on GitHub does,
# so a laptop cannot accidentally upload a crate or a wheel.

# Never publish from a workstation. CI is the sole publisher.
publish = false

# Push the bump commit and tag so the release workflow fires.
push = true
tag = true
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"

# Treat the workspace as one release unit. Both members share one version and
# one commit; nothing can drift.
shared-version = true
consolidate-commits = true

# Guardrail: releases must originate from main.
allow-branch = ["main"]

# Run `cargo publish --dry-run` locally before tagging so packaging regressions
# fail on the laptop, not after the tag lands on GitHub.
verify = true
