name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml \
            | grep -m1 '^version' \
            | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "Tag:        $TAG"
          echo "Cargo.toml: $CARGO_VERSION"
          if [ -z "$CARGO_VERSION" ] || [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match Cargo.toml workspace.package version ($CARGO_VERSION)"
            exit 1
          fi

  create-release:
    name: Create draft release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - name: Publish unretro
        # Idempotent: try to publish; treat "already exists" as success.
        # Covers first publishes (crate name must be claimed locally because
        # the CI token is scoped to "update existing" only) and re-runs of a
        # tagged workflow after a partial failure.
        shell: bash
        run: |
          set +e
          output=$(cargo publish --package unretro 2>&1)
          rc=$?
          set -e
          printf '%s\n' "$output"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          if printf '%s' "$output" | grep -qE "already (exists|uploaded)"; then
            echo "::notice::unretro ${GITHUB_REF_NAME#v} already on crates.io — treating as success"
            exit 0
          fi
          exit "$rc"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Append crates.io link to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://crates.io/crates/unretro/${VERSION}"
          CURRENT=$(gh release view "$TAG" --json body -q .body)
          if printf '%s' "$CURRENT" | grep -qF "$URL"; then
            echo "::notice::crates.io link already present — skipping append"
            exit 0
          fi
          LINK="- 📦 Published to crates.io: [\`unretro\` ${VERSION}](${URL})"
          gh release edit "$TAG" --notes "$(printf '%s\n\n%s\n' "$CURRENT" "$LINK")"

  build-wheels:
    name: Build wheels (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: true
          manylinux: auto
          working-directory: crates/unretro-python
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: crates/unretro-python/dist/*.whl

  build-sdist:
    name: Build sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/unretro-python
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/unretro-python/dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [publish-crate, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      # Needed so `gh release view / edit` can locate the repo.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent reruns: skip files already on PyPI instead of failing.
          skip-existing: true
      - name: Append PyPI link to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://pypi.org/project/unretro/${VERSION}/"
          CURRENT=$(gh release view "$TAG" --json body -q .body)
          if printf '%s' "$CURRENT" | grep -qF "$URL"; then
            echo "::notice::PyPI link already present — skipping append"
            exit 0
          fi
          LINK="- 🐍 Published to PyPI: [\`unretro\` ${VERSION}](${URL})"
          gh release edit "$TAG" --notes "$(printf '%s\n\n%s\n' "$CURRENT" "$LINK")"

  build-binaries:
    name: Build CLI (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          # x86_64 macOS binaries cross-compiled from the arm64 runner;
          # macos-13 was dropped because the queue is unreliable.
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin unretro --features std,full
          else
            cargo build --release --target ${{ matrix.target }} --bin unretro --features std,full
          fi
      - name: Package archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="unretro-v${VERSION}-${{ matrix.target }}"
          STAGE="staging/$NAME"
          mkdir -p "$STAGE" dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/unretro.exe" "$STAGE/"
          else
            cp "target/${{ matrix.target }}/release/unretro" "$STAGE/"
          fi
          cp README.md LICENSE "$STAGE/"
          cd staging
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip "../dist/${NAME}.zip" "$NAME" >/dev/null
          else
            tar -czf "../dist/${NAME}.tar.gz" "$NAME"
          fi
      - name: Upload archive to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  finalize-release:
    name: Publish GitHub release
    needs: [publish-pypi, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--repo` avoids needing a checkout just so gh can locate the repo.
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" --draft=false
